# Style Profiles - 字幕风格配置

profiles:
  clean:
    description: "简洁风格，白色字幕+黑边"
    font_name: "Arial"
    font_size: 48
    primary_color: "&H00FFFFFF"  # 白色
    outline_color: "&H00000000"  # 黑色
    outline_width: 2
    shadow: 0
    bold: false
  
  bold_outline:
    description: "粗体风格，黄色字幕+粗边框"
    font_name: "Arial Black"
    font_size: 52
    primary_color: "&H0000FFFF"  # 黄色
    outline_color: "&H00000000"  # 黑色
    outline_width: 3
    shadow: 2
    bold: true
  
  meme_heavy:
    description: "梗式风格，多彩字幕+特效"
    font_name: "Impact"
    font_size: 56
    primary_color: "&H00FFFFFF"  # 白色
    outline_color: "&H00FF0000"  # 蓝色边框
    outline_width: 4
    shadow: 3
    bold: true
    # 关键词自动变色
    keyword_colors:
      "哈哈": "&H0000FFFF"  # 黄色
      "？？": "&H000000FF"  # 红色
      "离谱": "&H00FF00FF"  # 紫色
